<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <title>Smartesion AR</title>
    <style>
      .install-fab{
    position:fixed;
    right:20px;
    bottom:20px;
    width:65px;
    height:65px;
    border-radius:50%;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,.3);
}

.install-fab img{
    width:100%;
    height:100%;
    object-fit:cover;
}
    </style>
  </head>
  <body>
       <div id="installApp" class="install-fab" hidden>
    <img src="icon-192.png" alt="Install VantageAI">
  <div class="install-card">
    <h2>⚠ Install Required</h2>

    <p>
      Install <strong>Smartesion AR</strong> for a faster,
      smoother experience with offline support.
    </p>

    <div class="buttons">
      <button id="installBtn">Install Now</button>
      <button id="laterBtn">Later</button>
    </div>
  </div>
</div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx">
      if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
}
        </script>
  </body>
</html>
