<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartesion AR</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico">
    <style>
.install-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:99999;
}

.install-card{

    width:380px;
    max-width:90%;

    background:#fff;
    border-radius:20px;

    padding:30px;

    text-align:center;

    animation:popup .35s ease;

    box-shadow:0 20px 40px rgba(0,0,0,.25);

}

.install-card img{

    width:90px;
    margin-bottom:15px;

}

.install-card h2{

    margin-bottom:10px;
    color:#1565C0;

}

.install-card p{

    color:#555;
    line-height:1.7;
    margin-bottom:25px;

}

.buttons{

    display:flex;
    justify-content:center;
    gap:15px;

}

.install-btn{

    background:#1565C0;
    color:white;

    border:none;
    border-radius:10px;

    padding:12px 25px;

    cursor:pointer;

    font-size:16px;

}

.install-btn:hover{

    background:#0d47a1;

}

.later-btn{

    background:#ECEFF1;

    border:none;

    border-radius:10px;

    padding:12px 25px;

    cursor:pointer;

    font-size:16px;

}

.install-fab{

    position:fixed;

    right:25px;
    bottom:25px;

    width:70px;
    height:70px;

    border-radius:50%;

    overflow:hidden;

    cursor:pointer;

    box-shadow:0 8px 20px rgba(0,0,0,.3);

    animation:bounce 2s infinite;

    z-index:99999;

}

.install-fab img{

    width:100%;
    height:100%;
    object-fit:cover;

}

@keyframes popup{

    from{

        opacity:0;
        transform:scale(.8);

    }

    to{

        opacity:1;
        transform:scale(1);

    }

}

@keyframes bounce{

    0%,100%{

        transform:translateY(0);

    }

    50%{

        transform:translateY(-8px);

    }

}
        </style>
    
</head>

<body>

    <div id="root"></div>

   
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
