<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>Smartesion AR</title>

    
    <link rel="icon" href="/favicon.ico">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        /* Floating Install Button */

        #installApp {
            position: fixed;
            right: 25px;
            bottom: 25px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .3);
            z-index: 9999;
            display: none;
            animation: bounce 2s infinite;
        }

        #installApp img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* Overlay */

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .65);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .card {
            width: 360px;
            max-width: 90%;
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            animation: popup .35s ease;
        }

        @keyframes popup {
            from {
                opacity: 0;
                transform: scale(.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card img {
            width: 90px;
            margin-bottom: 15px;
        }

        .card h2 {
            color: #1565c0;
            margin-bottom: 10px;
        }

        .card p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .buttons button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: .3s;
        }

        #installBtn {
            background: #1565c0;
            color: white;
        }

        #installBtn:hover {
            background: #0d47a1;
        }

        #laterBtn {
            background: #eceff1;
        }

        #laterBtn:hover {
            background: #cfd8dc;
        }

    </style>

</head>

<body>

   

    <!-- Floating Install Button -->
   <div id="root"></div>

<!-- React App -->
<script type="module" src="/src/main.tsx"></script>


</body>
</html>
