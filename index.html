<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartesion AR</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        /* Floating Install Button */

        #installApp {
            position: fixed;
            right: 25px;
            bottom: 25px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .3);
            z-index: 9999;
            display: none;
            animation: bounce 2s infinite;
        }

        #installApp img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }
        }

       .overlay{
    position: fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.65);

    opacity:0;
    visibility:hidden;

    transition:.3s;

    z-index:999999;
}

.overlay.show{
    opacity:1;
    visibility:visible;
}

       .card{
    width:380px;
    max-width:90%;
    background:#fff;
    border-radius:20px;
    padding:30px;
    text-align:center;

    position:relative;

    box-shadow:0 20px 40px rgba(0,0,0,.3);

    animation:popup .3s ease;
}

        @keyframes popup {
            from {
                opacity: 0;
                transform: scale(.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card img {
            width: 90px;
            margin-bottom: 15px;
        }

        .card h2 {
            color: #1565c0;
            margin-bottom: 10px;
        }

        .card p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .buttons button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: .3s;
        }

        #installBtn {
            background: #1565c0;
            color: white;
        }

        #installBtn:hover {
            background: #0d47a1;
        }

        #laterBtn {
            background: #eceff1;
        }

        #laterBtn:hover {
            background: #cfd8dc;
        }

    </style>

</head>

<body>

    <div id="root"></div>

    <!-- Floating Install Button -->

    <div id="installApp">
        <img src="/icon-192.png" alt="Install">
    </div>

    <!-- Install Overlay -->

    <div class="overlay" id="installOverlay">

        <div class="card">

            <img src="/icon-192.png" alt="Logo">

            <h2>Install Smartesion AR</h2>

            <p>
                Install Smartesion AR for a faster experience,
                offline support, notifications and quick access
                directly from your Home Screen.
            </p>

            <div class="buttons">

                <button id="installBtn">
                    Install Now
                </button>

                <button id="laterBtn">
                    Later
                </button>

            </div>

        </div>

    </div>

    <!-- React App -->

    <script type="module" src="/src/main.tsx"></script>

    <script>

       let deferredPrompt;

const fab = document.getElementById("installApp");
const overlay = document.getElementById("installOverlay");
const installBtn = document.getElementById("installBtn");
const laterBtn = document.getElementById("laterBtn");

// Show overlay immediately when page loads
window.addEventListener("load", () => {
    overlay.classList.add("show");
});

// Capture the install event
window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
});

// Install button
installBtn.addEventListener("click", async () => {

    if (deferredPrompt) {
        deferredPrompt.prompt();

        const { outcome } = await deferredPrompt.userChoice;

        if (outcome === "accepted") {
            console.log("User installed the app.");
        }

        deferredPrompt = null;
    } else {
        alert("The app is not ready to install yet. Please continue using the app for a moment and try again.");
    }

    overlay.classList.remove("show");
    fab.style.display = "block";

});

// Later button
laterBtn.addEventListener("click", () => {
    overlay.style.display = "none";
    fab.style.display = "block";
});

// Floating icon opens overlay again
fab.addEventListener("click", () => {
    overlay.style.display = "flex";
});

// Hide everything after installation
window.addEventListener("appinstalled", () => {
    overlay.style.display = "none";
    fab.style.display = "none";
});

// Register Service Worker
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/service-worker.js");
}    </script>

</body>

</html>
